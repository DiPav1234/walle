<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Define Dancing ✦</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#05070f">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%F0%9F%A4%8D%3C/text%3E%3C/svg%3E">
<style>
  :root{ --ink:#eaf2ff; --soft:#9fd0ff; --holo:#46ffae; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#05070f;overflow:hidden}
  body{font-family:ui-sans-serif,system-ui,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink)}
  #sky{position:fixed;inset:0;width:100%;height:100%;display:block}

  /* голограмма-таймер */
  #holo{position:fixed;left:0;right:0;top:max(6vh,26px);text-align:center;pointer-events:none;
    opacity:0;transition:opacity 1.6s ease 0.6s;animation:flick 3.4s infinite}
  #holo.show{opacity:1}
  #holo .hl{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:clamp(9px,1.8vw,12px);
    letter-spacing:.5em;color:var(--holo);opacity:.85;text-shadow:0 0 8px var(--holo)}
  #tmr{font-family:ui-monospace,Menlo,Consolas,monospace;font-weight:700;
    font-size:clamp(22px,5vw,46px);letter-spacing:.12em;color:var(--holo);
    text-shadow:0 0 10px rgba(70,255,174,.9),0 0 26px rgba(70,255,174,.45);margin:.18em 0}
  #holo .hd{font-family:ui-monospace,monospace;font-size:clamp(9px,1.6vw,12px);
    letter-spacing:.4em;color:var(--holo);opacity:.6;text-shadow:0 0 6px var(--holo)}
  @keyframes flick{0%,96%,100%{filter:brightness(1)}97%{filter:brightness(1.4)}98%{filter:brightness(.78)}99%{filter:brightness(1.2)}}

  #cap{position:fixed;left:0;right:0;bottom:max(5vh,26px);text-align:center;pointer-events:none;
    opacity:0;transform:translateY(12px);transition:opacity 2s ease, transform 2s ease;padding:0 18px}
  #cap.show{opacity:1;transform:none}
  #cap .tag{font-family:ui-monospace,monospace;font-size:clamp(9px,1.8vw,12px);letter-spacing:.45em;
    text-transform:uppercase;color:var(--soft);opacity:.75;margin-bottom:.7em}
  #cap h1{margin:0 auto;max-width:24ch;font-size:clamp(18px,3.3vw,32px);font-weight:700;font-style:italic;
    line-height:1.4;text-shadow:0 2px 26px rgba(0,0,0,.85),0 0 22px rgba(80,180,255,.22)}

  #loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:var(--soft);
    font-family:ui-monospace,monospace;font-size:12px;letter-spacing:.3em;text-transform:uppercase}
  #loader.hide{opacity:0;transition:opacity .6s ease;pointer-events:none}
</style>
</head>
<body>
  <canvas id="sky"></canvas>

  <div id="holo">
    <div class="hl">МЫ ВМЕСТЕ УЖЕ</div>
    <div id="tmr">—</div>
    <div class="hd">с 06·06·2026</div>
  </div>

  <div id="cap"><div class="tag">✦ define dancing ✦</div><h1 id="capH"></h1></div>
  <div id="loader">boot · EVE · WALL·E</div>

<script>
(function(){
"use strict";

/* =======================================================================
   НАСТРОЙКИ
   • MESSAGE — подпись (\n = перенос). • LETTER_WALLE / LETTER_EVE — буквы на роботах.
   • TIMER_FROM — точка отсчёта зелёного таймера. • ACCENT_* — цвета.
   ======================================================================= */
var CONFIG = {
  MESSAGE: "Сквозь Млечный Путь, сквозь холод пустоты —\nво всей Вселенной мне нужна лишь ты.",
  LETTER_WALLE: "Д",
  LETTER_EVE: "А",
  TIMER_FROM: [2026,6,6,0,0,0],   // год, месяц(1-12), день, ч, м, с
  ACCENT_EVE: "#37c8ff",
  ACCENT_HEART: "#ff5f8d"
};
/* =======================  КОНЕЦ НАСТРОЕК  ============================== */

var RM = !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);
var cv=document.getElementById("sky"), ctx=cv.getContext("2d");
var capWrap=document.getElementById("cap"), capH=document.getElementById("capH"), holo=document.getElementById("holo");
var tmr=document.getElementById("tmr"), loader=document.getElementById("loader");
capH.innerHTML=CONFIG.MESSAGE.split("\n").map(function(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;");}).join("<br>");

var dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1)), W=0,H=0;
function rnd(a,b){return a+Math.random()*(b-a);}
function clamp(v,a,b){return v<a?a:(v>b?b:v);}
function rrect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();ctx.fill();}
function heartPath(s){ctx.beginPath();ctx.moveTo(0,s*0.32);ctx.bezierCurveTo(s*0.05,s*0.05,s*0.5,s*0.02,s*0.5,s*0.32);ctx.bezierCurveTo(s*0.5,s*0.6,s*0.12,s*0.78,0,s);ctx.bezierCurveTo(-s*0.12,s*0.78,-s*0.5,s*0.6,-s*0.5,s*0.32);ctx.bezierCurveTo(-s*0.5,s*0.02,-s*0.05,s*0.05,0,s*0.32);ctx.closePath();}

/* ---------- ВАРП-ЗВЁЗДЫ (несёмся вперёд + крен) ---------- */
var ws=[];
function newWarp(spread){ var an=rnd(0,6.2832), rr=Math.sqrt(rnd(0.0001,1)); return {x:Math.cos(an)*rr, y:Math.sin(an)*rr, z:spread?rnd(0.06,1):1}; }
function makeWarp(){ ws=[]; var n=clamp(Math.round((W*H)/(5200*dpr)),220,760); for(var i=0;i<n;i++) ws.push(newWarp(true)); }
function drawWarp(dt,now){
  var cx=W/2, cy=H*0.5, sc=Math.min(W,H)*0.62, sp=(RM?0.00006:0.00026)*dt;
  var roll=now*0.00004, cr=Math.cos(roll), sr=Math.sin(roll);
  for(var i=0;i<ws.length;i++){ var s=ws[i], pz=s.z; s.z-=sp;
    if(s.z<=0.02){ ws[i]=newWarp(false); continue; }
    var rx=s.x*cr - s.y*sr, ry=s.x*sr + s.y*cr;
    var x1=cx+rx/s.z*sc, y1=cy+ry/s.z*sc, x0=cx+rx/pz*sc, y0=cy+ry/pz*sc;
    if(x1<-60||x1>W+60||y1<-60||y1>H+60){ ws[i]=newWarp(false); continue; }
    var b=clamp(1-s.z,0,1);
    ctx.strokeStyle="rgba(200,222,255,"+(0.12+b*0.75)+")"; ctx.lineWidth=(0.5+b*2.0)*dpr;
    ctx.beginPath(); ctx.moveTo(x0,y0); ctx.lineTo(x1,y1); ctx.stroke();
  }
}

/* ---------- частицы ---------- */
var hearts=[], puffs=[];
function addHeart(x,y,vy,sz){ hearts.push({x:x,y:y,vx:rnd(-0.25,0.25),vy:vy,s:sz,a:1,rot:rnd(-0.3,0.3),vr:rnd(-0.02,0.02)}); }
function addPuff(x,y,vx,vy){ puffs.push({x:x,y:y,vx:vx,vy:vy,s:rnd(5,12)*dpr,a:0.5}); }
function drawParticles(dt){
  for(var i=puffs.length-1;i>=0;i--){ var p=puffs[i]; p.x+=p.vx*dt/16;p.y+=p.vy*dt/16;p.s+=0.35*dt/16;p.a-=0.013*dt/16;
    if(p.a<=0){puffs.splice(i,1);continue;}
    ctx.globalAlpha=p.a*0.55; ctx.beginPath(); ctx.arc(p.x,p.y,p.s,0,6.28); ctx.fillStyle="#dfe9f5"; ctx.fill(); }
  for(var i=hearts.length-1;i>=0;i--){ var h=hearts[i]; h.x+=h.vx*dt/16;h.y+=h.vy*dt/16;h.vy-=0.003*dt/16;h.rot+=h.vr*dt/16;h.a-=0.006*dt/16;
    if(h.a<=0){hearts.splice(i,1);continue;}
    ctx.save(); ctx.globalAlpha=clamp(h.a,0,1); ctx.translate(h.x,h.y); ctx.rotate(h.rot);
    ctx.fillStyle=CONFIG.ACCENT_HEART; ctx.shadowColor=CONFIG.ACCENT_HEART; ctx.shadowBlur=10*dpr; heartPath(h.s); ctx.shadowBlur=0; ctx.restore(); }
  ctx.globalAlpha=1;
}

/* ---------- EVE (с буквой А) ---------- */
function drawEve(x,y,s,tilt){
  ctx.save(); ctx.translate(x,y); ctx.rotate(tilt);
  var g=ctx.createRadialGradient(0,0,0,0,0,s*1.7);
  g.addColorStop(0,"rgba(120,200,255,0.28)"); g.addColorStop(1,"rgba(120,200,255,0)");
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,s*1.7,0,6.28); ctx.fill();
  ctx.fillStyle="#eef3f9"; ctx.beginPath(); ctx.ellipse(0,0,s*0.62,s*0.95,0,0,6.28); ctx.fill();
  ctx.fillStyle="rgba(255,255,255,0.85)"; ctx.beginPath(); ctx.ellipse(-s*0.16,-s*0.22,s*0.3,s*0.5,0,0,6.28); ctx.fill();
  ctx.fillStyle="rgba(150,180,210,0.32)"; ctx.beginPath(); ctx.ellipse(s*0.2,s*0.2,s*0.26,s*0.4,0,0,6.28); ctx.fill();
  // буква А на корпусе
  ctx.fillStyle="rgba(90,120,150,0.6)"; ctx.font="700 "+(s*0.4)+"px ui-sans-serif,system-ui"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(CONFIG.LETTER_EVE, 0, s*0.5);
  // визор + синие глаза
  ctx.fillStyle="#0a0e15"; ctx.beginPath(); ctx.ellipse(0,-s*0.16,s*0.52,s*0.36,0,0,6.28); ctx.fill();
  ctx.fillStyle=CONFIG.ACCENT_EVE; ctx.shadowColor=CONFIG.ACCENT_EVE; ctx.shadowBlur=s*0.32;
  for(var sgn=-1;sgn<=1;sgn+=2){ ctx.save(); ctx.translate(sgn*s*0.18,-s*0.16); ctx.rotate(sgn*0.32);
    ctx.beginPath(); ctx.ellipse(0,0,s*0.055,s*0.15,0,0,6.28); ctx.fill(); ctx.restore(); }
  ctx.shadowBlur=0; ctx.restore();
}
/* ---------- WALL·E (с буквой Д) ---------- */
function drawWalle(x,y,s,tilt){
  ctx.save(); ctx.translate(x,y); ctx.rotate(tilt);
  ctx.fillStyle="#34343a"; rrect(-s*0.58,s*0.42,s*0.46,s*0.5,s*0.13); rrect(s*0.12,s*0.42,s*0.46,s*0.5,s*0.13);
  ctx.fillStyle="#1d1d20"; rrect(-s*0.5,s*0.55,s*0.3,s*0.24,s*0.08); rrect(s*0.2,s*0.55,s*0.3,s*0.24,s*0.08);
  ctx.fillStyle="#c9a24f"; rrect(-s*0.5,-s*0.18,s*1.0,s*0.72,s*0.1);
  ctx.fillStyle="#b78a37"; rrect(-s*0.42,s*0.06,s*0.84,s*0.3,s*0.06);
  ctx.fillStyle="#6f5320"; rrect(-s*0.26,s*0.08,s*0.52,s*0.26,s*0.05);
  // буква Д
  ctx.fillStyle="#ffd98a"; ctx.font="700 "+(s*0.26)+"px ui-sans-serif,system-ui"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(CONFIG.LETTER_WALLE, 0, s*0.21);
  ctx.fillStyle="#8a8a90"; ctx.fillRect(-s*0.05,-s*0.4,s*0.1,s*0.24);
  ctx.strokeStyle="#8a8a90"; ctx.lineWidth=s*0.07; ctx.lineCap="round";
  ctx.beginPath(); ctx.moveTo(s*0.42,0); ctx.lineTo(s*0.72,-s*0.05); ctx.stroke();
  ctx.fillStyle="#d2402f"; rrect(s*0.66,-s*0.26,s*0.16,s*0.34,s*0.05);
  ctx.fillStyle="#9aa0a6"; ctx.fillRect(s*0.71,-s*0.34,s*0.06,s*0.1);
  ctx.save(); ctx.translate(0,-s*0.48);
  ctx.fillStyle="#9aa0a6"; rrect(-s*0.48,-s*0.17,s*0.96,s*0.32,s*0.15);
  for(var sgn=-1;sgn<=1;sgn+=2){ ctx.fillStyle="#c9ced3"; ctx.beginPath(); ctx.arc(sgn*s*0.27,0,s*0.18,0,6.28); ctx.fill();
    ctx.fillStyle="#0f0f12"; ctx.beginPath(); ctx.arc(sgn*s*0.27,0,s*0.105,0,6.28); ctx.fill();
    ctx.fillStyle="#bfeaff"; ctx.beginPath(); ctx.arc(sgn*s*0.27+s*0.035,-s*0.025,s*0.04,0,6.28); ctx.fill(); }
  ctx.restore(); ctx.restore();
}

/* ---------- сцена ---------- */
var raf=null, startT=null, lastNow=0, captionShown=false;
var wx=0,wy=0,wvx=0,wvy=0, inited=false, evTrail=[];
function frame(now){
  if(startT==null){ startT=now; lastNow=now; }
  var t=now-startT, dt=clamp(now-lastNow,0,50), st=dt/16; lastNow=now;
  // фон
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#070b1a"); g.addColorStop(0.55,"#0a1024"); g.addColorStop(1,"#120a22");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  drawWarp(dt,now);

  // EVE — хаотичный лиссажу
  var Cx=W/2, Cy=H*0.52, Ax=Math.min(W,H)*0.17, Ay=Math.min(W,H)*0.13;
  var ex=Cx + Math.sin(t*0.0011)*Ax + Math.sin(t*0.0017+1.3)*Ax*0.5;
  var ey=Cy + Math.sin(t*0.0013+0.7)*Ay + Math.cos(t*0.0023)*Ay*0.55;
  // WALL·E догоняет EVE по её СЛЕДУ с задержкой -> кружат вместе, не слипаясь
  evTrail.push(ex,ey); if(evTrail.length>90){ evTrail.splice(0,2); }
  var tgx=evTrail[0], tgy=evTrail[1];
  if(!inited){ wx=tgx-60; wy=tgy+40; inited=true; }
  wvx += (tgx-wx)*0.022*st; wvy += (tgy-wy)*0.022*st;
  wvx *= Math.pow(0.90, st); wvy *= Math.pow(0.90, st);
  wx += wvx*st; wy += wvy*st;

  var s=Math.min(W,H)*0.07;
  var eveTilt=Math.sin(t*0.002)*0.22;
  var walTilt=Math.sin(t*0.0017)*0.5 + t*0.0004;   // кувыркается

  // пшик огнетушителя — против скорости WALL·E
  var vlen=Math.hypot(wvx,wvy)||1;
  if(!RM && Math.random()<0.5){ addPuff(wx+ (wvx/vlen)*s*0.7 + s*0.6, wy+(wvy/vlen)*s*0.6, -(wvx/vlen)*1.6*dpr+rnd(-0.4,0.4), -(wvy/vlen)*1.6*dpr+rnd(-0.4,0.4)); }
  // след из сердечек между партнёрами
  if(!RM && Math.random()<0.16){ addHeart((ex+wx)/2+rnd(-12,12),(ey+wy)/2,-rnd(0.3,0.8)*dpr,rnd(8,15)*dpr); }
  drawParticles(dt);

  // искра рук при сближении
  var dist=Math.hypot(ex-wx,ey-wy);
  if(dist < s*2.4){ ctx.globalAlpha=clamp(1-dist/(s*2.6),0,1)*0.6; ctx.strokeStyle="#bff0ff"; ctx.lineWidth=2*dpr;
    ctx.shadowColor="#7fe3ff"; ctx.shadowBlur=10*dpr; ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(wx,wy); ctx.stroke(); ctx.shadowBlur=0; ctx.globalAlpha=1; }

  if(ey>=wy){ drawWalle(wx,wy,s,walTilt); drawEve(ex,ey,s,eveTilt); }
  else { drawEve(ex,ey,s,eveTilt); drawWalle(wx,wy,s,walTilt); }

  if(t>2200 && !captionShown){ captionShown=true; capWrap.classList.add("show"); holo.classList.add("show"); }
  raf=requestAnimationFrame(frame);
}

/* ---------- зелёный таймер ---------- */
var f=CONFIG.TIMER_FROM, T0=new Date(f[0],f[1]-1,f[2],f[3],f[4],f[5]).getTime();
function pad(n){ return n<10?"0"+n:""+n; }
function tick(){ var d=Date.now()-T0; if(d<0)d=0; var sec=Math.floor(d/1000);
  var s=sec%60, m=Math.floor(sec/60)%60, h=Math.floor(sec/3600)%24, days=Math.floor(sec/86400);
  tmr.textContent = days+"д  "+pad(h)+":"+pad(m)+":"+pad(s); }
setInterval(tick,1000); tick();

function sizeCanvas(){ var cssW=window.innerWidth,cssH=window.innerHeight;
  W=Math.round(cssW*dpr); H=Math.round(cssH*dpr); cv.width=W; cv.height=H; cv.style.width=cssW+"px"; cv.style.height=cssH+"px"; makeWarp(); }
var sizeTimer=null;
window.addEventListener("resize", function(){ if(sizeTimer)clearTimeout(sizeTimer); sizeTimer=setTimeout(sizeCanvas,200); });

sizeCanvas(); loader.classList.add("hide");
raf=requestAnimationFrame(frame);

})();
</script>
</body>
</html>
